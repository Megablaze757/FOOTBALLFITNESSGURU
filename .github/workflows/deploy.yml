name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static export
        env:
          # Base path must be empty when the site is served from the root of a
          # domain — that's true both for <user>.github.io repos and for any repo
          # with a CNAME (custom domain). Leaving it as /<repo> on a custom
          # domain 404s every script, stylesheet and link on the site.
          NEXT_PUBLIC_BASE_PATH: ${{ (hashFiles('CNAME') != '' || endsWith(github.repository, '.github.io')) && '' || format('/{0}', github.event.repository.name) }}
          # Public client values — override by setting repo Variables of the same name.
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || 'https://txqhstackgidjqkkrzyj.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'sb_publishable_kr26XwyR0HZxS3HR3UJI2Q_YLLT7Sfl' }}
          # Optional: your Cloudflare Worker URL (unlocks AI/Stripe/email). Set a repo Variable of this name.
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || '' }}
        run: |
          npm run build
          touch out/.nojekyll
          # The Pages artifact is `out/`, so a CNAME sitting in the repo root
          # never reaches the deployment and the custom domain gets dropped on
          # the next deploy. Copy it in.
          if [ -f CNAME ]; then cp CNAME out/CNAME; fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
