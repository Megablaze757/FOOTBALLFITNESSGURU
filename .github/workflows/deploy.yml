name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static export
        env:
          # Empty, because the site is served from the root of pocketathlete.com.
          # A non-empty base path here 404s every stylesheet and script on the
          # site — that is what broke the first custom-domain deploy. Only set
          # the NEXT_PUBLIC_BASE_PATH repo Variable if you ever go back to
          # serving from https://<user>.github.io/<repo>/.
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
          # Public client values — override by setting repo Variables of the same name.
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || 'https://txqhstackgidjqkkrzyj.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'sb_publishable_kr26XwyR0HZxS3HR3UJI2Q_YLLT7Sfl' }}
          # Optional: your Cloudflare Worker URL (unlocks AI/Stripe/email). Set a repo Variable of this name.
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || '' }}
        run: |
          npm run build
          touch out/.nojekyll
          # The Pages artifact is `out/`, so a CNAME sitting in the repo root
          # never reaches the deployment and the custom domain gets dropped on
          # the next deploy. Copy it in.
          if [ -f CNAME ]; then cp CNAME out/CNAME; fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
