name = "apex-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Reminder emails: 08:00 UTC daily (daily + deadline reminders; weekly on Mondays).
[triggers]
crons = ["0 8 * * *"]

# Non-secret defaults. Point these at your project.
[vars]
OPENROUTER_MODEL = "deepseek/deepseek-v4-flash"
AI_DAILY_LIMIT = "40"   # max AI coach calls per user per day; over this, the on-device engine is used
SUPABASE_URL = "https://txqhstackgidjqkkrzyj.supabase.co"
APP_URL = "https://pocketathlete.com"
REMINDER_FROM = "PocketAthlete <info@pocketathlete.com>"

# Stripe price IDs. These are NOT secret — a price_... id is safe in public code
# (Stripe exposes them client-side), so they live here as plain vars rather than
# wrangler secrets. Paste your live IDs from the Stripe dashboard (Products → the
# product → Pricing → the price_... id). Test-mode and live-mode ids differ; use
# the pair that matches whichever STRIPE_SECRET_KEY you set.
STRIPE_PRICE_SILVER = "price_1TvCAyG0ICmhMX6mAvegjzCb"   # £15/mo individual
STRIPE_PRICE_GOLD   = "price_1TvCBcG0ICmhMX6mLuUwY3Qe"   # £20/mo individual

# Secrets are NOT stored here — set them with `wrangler secret put NAME`:
#   OPENROUTER_API_KEY            (your OpenRouter key — powers coach chat + programs)
#   SUPABASE_ANON_KEY             (publishable key — used to verify caller sessions)
#   SUPABASE_SERVICE_ROLE_KEY     (server-only — Stripe/email write to the DB)
#   STRIPE_SECRET_KEY             (sk_... — the sensitive one)
#   STRIPE_WEBHOOK_SECRET         (whsec_... — from the webhook endpoint)
#   GAS_EMAIL_URL     (Google Apps Script web-app URL — preferred, free email via Gmail)
#   GAS_EMAIL_SECRET  (shared secret that the Apps Script checks)
#   RESEND_API_KEY    (optional fallback if you don't use Apps Script)
