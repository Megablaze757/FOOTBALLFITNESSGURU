<!-- Supabase → Authentication → Email Templates → Reauthentication -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f6f7f9;margin:0;padding:24px 12px;">
  <tr>
    <td align="center">
      <div style="display:none;max-height:0;overflow:hidden;opacity:0;">Your PocketAthlete confirmation code.</div>
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;background:#ffffff;border:1px solid #e6e7ec;border-radius:14px;">
        <tr>
          <td style="padding:28px 32px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
            <div style="font-size:17px;font-weight:800;color:#14141a;"><span style="color:#c8971f;">◆</span> PocketAthlete</div>
            <h1 style="margin:20px 0 12px 0;font-size:22px;line-height:1.3;font-weight:800;color:#14141a;">Your confirmation code</h1>
            <p style="margin:0 0 20px 0;font-size:15px;line-height:1.65;color:#14141a;">Enter this code to confirm it's you.</p>
            <div style="font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:30px;font-weight:700;letter-spacing:7px;color:#14141a;background:#f6f7f9;border:1px solid #e6e7ec;border-radius:10px;padding:16px;text-align:center;">{{ .Token }}</div>
            <p style="margin:20px 0 0 0;font-size:13px;line-height:1.6;color:#5b6070;border-top:1px solid #e6e7ec;padding-top:18px;">
              We will never ask you for this code by message or phone. If you didn't request it, ignore this email.
            </p>
          </td>
        </tr>
      </table>
      <div style="max-width:560px;padding:14px 8px 0 8px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;color:#8b90a0;text-align:center;">
        PocketAthlete · <a href="{{ .SiteURL }}" style="color:#8b90a0;">pocketathlete.com</a>
      </div>
    </td>
  </tr>
</table>
